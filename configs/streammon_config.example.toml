# Timezone for timestamps in logs.
timezone = "UTC"

# Global limit for concurrent downloads.
max_concurrent_downloads = 10

# Enable or disable monitors globally.
enable_youtube = true
enable_twitch = true

# General verbose debug flags for each platform.
youtube_verbose_debug = true
twitch_verbose_debug = true

# Granular debug flags for Twitch.
twitch_api_verbose_debug = false
twitch_dlp_verbose_debug = true

# Granular debug flags for YouTube.
youtube_api_verbose_debug = true
youtube_dlp_verbose_debug = true

# Archive downloaded video IDs to prevent redundant redownloads.
youtube_archive_downloads = true
twitch_archive_downloads = true

# Save downloader subprocess logs beside downloaded files.
save_download_logs = true

# Enable a shared log file for system-level events (startup, connection checks, etc.).
save_system_logs = true

# Relative or absolute path for the system log file.
system_log_path = "streammon.log"

# Log subprocess progress lines at most this often, in seconds.
subprocess_progress_interval = 30

# Log downloader wait countdown lines at most this often, in seconds.
subprocess_wait_interval = 600

# Delete old lockfiles from working directories on startup.
clear_all_lockfiles = true
