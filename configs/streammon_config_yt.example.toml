[streammon]
# Where downloaded YouTube streams are saved.
working_directory = "download_yt"

[yt-dlp]
# Arguments passed to yt-dlp.
args = [
    "--wait-for-video", "60",
    "--live-from-start",
    "--js-runtime", "node",
    "--embed-thumbnail",
    "--convert-thumbnail", "png",
    "--write-thumbnail",
    "--retries", "10",
    "--color", "always",
	"--restrict-filenames",
    "--output", "[%(upload_date)s] [%(id)s] [%(title)s] [%(channel)s].%(ext)s",
	# "--concurrent-fragments", "4",
    # "--ignore-errors",
    # Cookies for regular streams are manual:
    # "--cookies", "youtube_cookies.txt",
    # "--cookies-from-browser", "firefox",
]

[livestream_dl]
# Allows livestream_dl to be used as a fallback after regular yt-dlp downloads fail.
# Regular streams can still use livestream_dl through scraper.downloader_method.
# Member streams can still use livestream_dl through scraper.member_downloader.
enabled = false

# Arguments passed to livestream_dl.
args = [
    "--resolution", "best",
    "--threads", "4",
    "--segment-retries", "10",
    "--output", "[%(upload_date)s] [%(id)s] [%(title)s] [%(channel)s]",
    "--write-thumbnail",
    "--embed-thumbnail",
    "--wait-for-video", "60",
    "--ytdlp-command-line-options=--js-runtime node",
]

[scraper]
# Ignore RSS entries older than this when streammon starts.
ignore_older_than = "24h"

# How often to check the full channel list.
poll_interval = "30s"

# Rate limit for channel checks.
max_requests_per_second = 2

# Default live check method: "rss" or "live".
check_method = "live"

# Default regular-stream downloader: "yt-dlp" or "livestream_dl".
# The other downloader can be used as fallback if configured.
downloader_method = "yt-dlp"

# How long to keep using a working fallback check method.
fallback_duration = "15m"

# Netscape-format YouTube cookies file for member checks/downloads.
cookies_file = "youtube_cookies.txt"

# Check members-only playlists for every channel.
member_check_all = false

# Downloader for members-only streams: "livestream_dl" or "yt-dlp".
member_downloader = "livestream_dl"

# Stop a downloader after this many [wait] retry lines. 0 disables this.
download_wait_retries = 3

# If a downloader completes while the same video is still live and no alternate downloader is available, retry 
# the same downloader with a timestamped output name. This can create split/duplicate files, so it is off by default.
retry_same_downloader_with_timestamp_when_live = false

# If a YouTube download completed but the next poll finds the stream offline, retry once with yt-dlp 
# after removing --live-from-start and --wait-for-video. This uses a timestamped output name to avoid being skipped.
retry_offline_without_live_args = false

# yt-dlp args used for members-only playlist checks.
member_check_args = [
    "--flat-playlist",
    "--playlist-items", "1:3",
    "--dump-single-json",
    "--no-warnings",
]

# ========================== Channels ========================== #
# Filter presets
# All: [".*"]
# Yabai-ish: ["(?i).*karaoke.*|.*archive.*|.*guerilla.*|.*gorilla.*|.*gorila.*|.*surprise.*|.*handcam.*|.*asmr.*"]
# Yabai-er: ["(?i)(unarc(hiv(e|ed))?|unlisted|no\\s?arch(ive)?|vod|karaok(e|ey)|sing(ing|ies)?|(^|[^[:alnum:]])songs?([^[:alnum:]]|$)|music|acapella|3dio|asmr|handcam|watch-?a-?long|birthday|off[- ]?collab|guer(r)?illa|gowilla|goril(l)?a|ゲリラ|歌枠|アーカイブなし|はメン限)"]
# Extra yab markers: ["(?i)(limited[- ]?time|member[- ]?only|歌回|同時視聴|ウォッチパーティ|watch[- ]?party|rebroadcast|再放送|endurance|耐久|凸待ち|call[- ]?in|drunk|飲酒|罰ゲーム|batsu|実写|irl)"]
# Optional additional_args are appended to the global yt-dlp or livestream_dl args.
# YouTube currently does not need the Twitch-specific --strip-live-from-start option.

# Example:
# [[channel]]
# id = "UCFzQd4pZ43ZNEdWBFe7QOKA"
# name = "Saya Sairroxs"
# filters = ["(?i).*karaoke.*|.*archive.*|.*guerilla.*|.*gorilla.*|.*gorila.*|.*surprise.*|.*handcam.*|.*asmr.*"]
# additional_args = []
# member_check = false
