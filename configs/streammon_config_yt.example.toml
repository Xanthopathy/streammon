[streammon]
# working_directory: Where downloaded YouTube streams are saved.
# Use relative paths (from current directory) or absolute paths.
# Examples:
#   - "download_yt"                  (current directory)
#   - "../downloads/youtube"         (parent directory)
#   - "../../streams/archive"        (two levels up)
#   - "C:\\Archives\\YouTube"       (absolute Windows path)
#   - "/mnt/media/youtube"           (absolute Linux path)
working_directory = "download_yt"

# Arguments passed to yt-dlp. (See https://github.com/yt-dlp/yt-dlp)
# You can comment out lines using '#' to disable specific flags.
args = [
    "--wait-for-video", "60",
    "--live-from-start",
    "--js-runtime", "node",
    "--embed-thumbnail",
    "--convert-thumbnail", "png",
    "--write-thumbnail",
    "--retries", "10",
    "--color", "always",
    "--output", "[%(upload_date)s] [%(id)s] [%(title)s] [%(channel)s].%(ext)s",
	# "--concurrent-fragments", "4",
    # "--ignore-errors",
    # Manual alternative to cookies_file/use_cookies_for_downloads:
    # "--cookies-from-browser", "firefox",
]

[livestream_dl]
# Optional fallback used once when a yt-dlp download fails.
# Install from https://github.com/CanOfSocks/livestream_dl and make sure the
# livestream_dl executable is available in PATH before enabling this.
enabled = false

# Add "--cookies cookies_file" to fallback downloads. This is independent from
# scraper.use_cookies_for_downloads so the fallback can be configured separately.
use_cookies = false

# Arguments passed to livestream_dl. streammon appends the YouTube video ID.
# With use_cookies=true, it also appends "--cookies cookies_file" unless these
# args already include --cookies or --cookies-from-browser.
args = [
    "--resolution", "best",
    "--threads", "4",
    "--segment-retries", "10",
    "--output", "[%(upload_date)s] [%(id)s] [%(title)s] [%(channel)s].%(ext)s",
    "--write-thumbnail",
    "--embed-thumbnail",
    "--wait-for-video", "60",
    "--ytdlp-command-line-options=--js-runtime node",
]

[scraper]
# ignore_older_than: Ignores videos whose rss entries has a longer [updated] field's time to now than the configured limit 
# 24h default means it only downloads videos with an [updated] time within 24h of the time the app started
ignore_older_than = "24h"

# poll_interval: How often to check each channel for new/live streams.
# This is your "freshness target" - how frequently you want to detect new streams.
# Spread intelligently: A monitor with 40 channels at poll_interval=60s will space
# individual API requests ~1.5s apart (using max_requests_per_second as the safety limit).
# Lower = more responsive but higher load. Recommended range: 30s-180s depending on channel count.
# YouTube RSS has soft rate limits; test your setup and monitor error logs.
poll_interval = "30s"

# max_requests_per_second: Rate limit for API checks (default: 2)
# Balances freshness with detection avoidance. Example:
#  + 40 channels @ 2 RPS = minimum 20s between request waves
#  + Actual spacing = max(poll_interval / channels, 1 / max_requests_per_second)
# Increase cautiously if you get rate-limited; YouTube doesn't like bursts. (Wait an hour or more before running this app again if it softblocks)
max_requests_per_second = 2

# check_method: The default method to check for live streams.
# Options:
#   - "rss": Low bandwidth, relies on YouTube's RSS feed updating (can be delayed).
#   - "live": Checks the channel's /live page. More accurate/real-time but heavier.
# If the default method fails, the other method is tried automatically as a fallback.
check_method = "live"

# fallback_duration: How long to stick to the fallback method after a failure.
# If the primary method (e.g., RSS) fails, the system switches to the fallback (e.g., Live Page)
# and stays there for this duration before trying the primary method again.
# Default: "15m"
fallback_duration = "15m"

# cookies_file: Netscape-format YouTube cookies file.
# Used only when one of the cookie-backed settings below enables it.
cookies_file = "youtube_cookies.txt"

# use_cookies_for_downloads: Adds "--cookies cookies_file" to yt-dlp downloads.
# Useful for account-required, age-gated, members-only, or random YouTube behavior.
# Leave false if you manually put --cookies or --cookies-from-browser in [streammon].args.
# Set this globally for every channel, or set use_cookies_for_downloads=true on only
# the channels that need cookies.
use_cookies_for_downloads = false

# member_check_all: Check YouTube members-only playlists for every configured channel.
# Requires cookies for an account that legitimately has membership access.
# Usually keep this false and set member_check=true only on channels you are membered to.
member_check_all = false

# member_check_args: Advanced yt-dlp arguments used for members-only playlist checks.
# These should emit playlist JSON while limiting how many recent entries are inspected.
member_check_args = [
    "--flat-playlist",
    "--playlist-items", "1:3",
    "--dump-single-json",
    "--no-warnings",
]

# ========================== Channels ========================== #
# Common filter presets (Copy-paste these into channel filters)
# All: [".*"]
# Common keywords for yabai streams: ["(?i).*karaoke.*|.*archive.*|.*guerilla.*|.*gorilla.*|.*gorila.*|.*surprise.*|.*handcam.*|.*asmr.*"]

# Example:
# [[channel]]
# id = "UCFzQd4pZ43ZNEdWBFe7QOKA"
# name = "Saya Sairroxs"
# filters = ["(?i).*karaoke.*|.*archive.*|.*guerilla.*|.*gorilla.*|.*gorila.*|.*surprise.*|.*handcam.*|.*asmr.*"]
# member_check: Check this channel's members-only playlist using cookies_file.
# Useful when you are membered to this channel but not every tracked channel.
# member_check = false
# use_cookies_for_downloads: Use cookies for this channel's downloads only.
# use_cookies_for_downloads = false
