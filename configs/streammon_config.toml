# Timezone for timestamps in logs. Uses IANA Time Zone database names.
# Examples: "UTC", "America/New_York", "Europe/London", "Asia/Tokyo"
# You can also use fixed offsets like "UTC-5" or "UTC+3".
timezone = "UTC"

# Global limit for concurrent downloads (Not yet implemented in logic)
max_concurrent_downloads = 10

# Enable/disable monitors globally.
enable_youtube = true
enable_twitch = true

# General verbose debug flags (controls terminal output for that platform)
# Overrides the granular debug flags below
youtube_verbose_debug = true
twitch_verbose_debug = true

# Granular debug flags for Twitch (more precise control over terminal output)
twitch_api_verbose_debug = false    # Show Twitch GraphQL API calls and responses
twitch_dlp_verbose_debug = true     # Show raw twitch-dlp subprocess output

# Granular debug flags for YouTube (more precise control over terminal output)
youtube_api_verbose_debug = false   # Show YouTube RSS API calls and responses
youtube_dlp_verbose_debug = true    # Show raw yt-dlp subprocess output

# Save logs from download processes (yt-dlp/twitch-dlp) to .log files in the download folder
save_download_logs = true

# Archive downloaded video IDs to 'archive.txt' in the working directory to prevent redundant redownloads
youtube_archive_downloads = true
twitch_archive_downloads = true

# How often to write subprocess progress lines to log files (in seconds)
# Set to 0 to log every progress update (can be verbose)
# Set to 1 or higher to throttle progress logging
subprocess_progress_interval = 30

# How often to write subprocess progress lines to log files (in seconds)
# Exclusively for [wait] Remaining time until next attempt: hh:mm:ss
subprocess_wait_interval = 600