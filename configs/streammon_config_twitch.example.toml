[streammon]
# Where downloaded Twitch streams are saved.
working_directory = "download_twitch"

# Arguments passed to twitch-dlp.
args = [
    "--live-from-start",
    "--retry-streams", "60",
    "--output", "[%(upload_date)s] [%(id)s] [%(uploader)s] [%(title)s].%(ext)s"
]

[scraper]
# How often to check the full channel list.
poll_interval = "30s"

# Rate limit for channel checks.
max_requests_per_second = 2

# ========================== Channels ========================== #
# Use filters = [".*"] to download every live stream.

# Example:
# [[channel]]
# id = "sayasairroxs"
# name = "Saya Sairroxs"
# filters = [".*"]
